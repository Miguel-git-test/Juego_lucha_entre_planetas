<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Planetary Conquest - Auralux Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="hud-item score-blue">Player: <span id="player-planets">1</span></div>
            <div class="hud-item score-red">AI: <span id="ai-planets">1</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>PLANETARY</h1>
            <h1 style="font-size: 2.5rem; margin-top: -1.5rem;">CONQUEST</h1>
            
            <div class="tutorial-container">
                <div class="tutorial-item">
                    <span class="icon">👆↔️</span>
                    <p><strong>OPCIÓN 1:</strong> Arrastra desde tu planeta al objetivo para enviar tropas.</p>
                </div>
                <div class="tutorial-item">
                    <span class="icon">👆...🎯</span>
                    <p><strong>OPCIÓN 2:</strong> Toca tu planeta, levanta el dedo y toca el objetivo.</p>
                </div>
            </div>
            
            <div class="speed-selector">
                <p style="margin-bottom: 0.5rem; font-size: 0.8rem;">VELOCIDAD</p>
                <div class="speed-buttons">
                    <button class="speed-btn" data-speed="0.5">Lenta</button>
                    <button class="speed-btn" data-speed="0.75">Media</button>
                    <button class="speed-btn active" data-speed="1.0">Estándar</button>
                </div>
            </div>

            <button id="start-button">SELECCIONAR NIVEL</button>
        </div>

        <div id="level-selector-screen" class="overlay hidden">
            <h1>CAMPAÑA</h1>
            <div id="level-grid" class="level-grid">
                <!-- Levels will be injected here -->
            </div>
            <button id="back-to-start" style="margin-top: 2rem; width: auto; padding: 0.8rem 2rem; font-size: 0.8rem;">VOLVER</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 id="game-over-title">MISIÓN FALLIDA</h1>
            <p id="game-over-msg">Tus fuerzas han sido diezmadas. La galaxia cae en el caos.</p>
            <div style="display: flex; gap: 1rem; width: 100%; justify-content: center;">
                <button id="restart-button" style="width: auto;">REINTENTAR</button>
                <button id="next-level-button" class="hidden" style="width: auto; border-color: var(--accent-blue);">SIGUIENTE</button>
                <button id="menu-button" style="width: auto;">MENÚ</button>
            </div>
        </div>

        <div id="version-tag">v1.3.0</div>
    </div>

    <script src="game.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error', err));
            });
        }
    </script>
</body>
</html>
